# ---------------------------------------------------------------------------
# Prompt Guard API — Fly.io Configuration
# Task: T023 | Spec: FR-13
# ---------------------------------------------------------------------------

app = "prompt-guard"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8420"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8420
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/v1/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
