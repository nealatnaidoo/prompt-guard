# ---------------------------------------------------------------------------
# Prompt Guard — CI Quality Gates
# Task: T024 | Spec: FR-14.1 through FR-14.3
# Triggers on all pushes and PRs to main.
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Tests with coverage (pytest)
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=100 -x -q --tb=short
