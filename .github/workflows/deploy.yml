# ---------------------------------------------------------------------------
# Prompt Guard — Deploy to Fly.io
# Task: T025 | Spec: FR-14.4 through FR-14.7
# Triggers on push to main only. Runs quality gates, then deploys.
# ---------------------------------------------------------------------------

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Quality Gates (same as CI) ----
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Tests with coverage (pytest)
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80 -x -q --tb=short

  # ---- Deploy to Fly.io ----
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [quality-gates]

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy prompt-guard
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ---- Smoke Test ----
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Wait for deployment to stabilise
        run: sleep 15

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://prompt-guard.fly.dev/v1/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"
