# Rules: Prompt Guard
# Version: 1
# Created: 2026-02-26
# Purpose: Domain rules, coding policies, and quality gates for prompt-guard retrofit

---

# ── Domain Rules ─────────────────────────────────────────────────────────────

threat_classification:
  description: "Map aggregated threat score to ThreatLevel enum"
  boundaries:
    - level: clean
      range: "[0.0, 0.20)"
    - level: low
      range: "[0.20, 0.40)"
    - level: medium
      range: "[0.40, 0.65)"
    - level: high
      range: "[0.65, 0.85)"
    - level: critical
      range: "[0.85, 1.0]"
  critical_override:
    description: "Force CRITICAL if a finding in a critical category has score >= 0.90"
    categories:
      - prompt_injection
      - jailbreak
      - data_exfiltration
    threshold: 0.90

policy_action_mapping:
  description: "Map ThreatLevel to PolicyAction"
  rules:
    - threat_level: clean
      action: pass
    - threat_level: low
      action: pass
    - threat_level: medium
      action: warn
    - threat_level: high
      action: quarantine
    - threat_level: critical
      action: reject

detector_weights:
  description: "Default weights for score aggregation (must sum to 1.0)"
  defaults:
    pattern: 0.30
    heuristic: 0.25
    semantic: 0.25
    entropy: 0.10
    provenance: 0.10

multi_detector_boost:
  description: "Boost score when multiple detectors agree (score > 0.5)"
  rules:
    - agreeing_count: 4
      boost_factor: 1.25
      note: "Check >= 4 BEFORE >= 3 to avoid unreachable branch"
    - agreeing_count: 3
      boost_factor: 1.15

critical_finding_floor:
  description: "Any finding with effective score >= 0.90 forces base_score >= 0.80"
  threshold: 0.90
  floor: 0.80

content_length_limit:
  max_chars: 500000
  on_exceed:
    threat_level: high
    threat_score: 0.90
    action: reject

sanitise_level_escalation:
  description: "Escalate sanitise level based on threat level"
  rules:
    - threat_level: [high, critical]
      forced_level: strict
    - threat_level: [medium]
      forced_level: standard

sanitise_passes:
  description: "Ordered sanitisation passes by level"
  minimal:
    - strip_invisible_unicode
  standard:
    - strip_invisible_unicode
    - normalise_confusables
    - escape_ai_tags
    - neutralise_delimiters
  strict:
    - strip_invisible_unicode
    - normalise_confusables
    - escape_ai_tags
    - neutralise_delimiters
    - wrap_safety_delimiters

audit_logging:
  description: "Audit log filtering rules"
  log_clean_results: false
  log_threat_results: true
  threat_evidence_max_chars: 300
  content_hash_algorithm: sha256
  content_hash_truncate: 32

# ── Coding Rules ─────────────────────────────────────────────────────────────

determinism:
  description: "Non-deterministic functions forbidden in domain code"
  forbidden_in_domain:
    - "uuid.uuid4"
    - "uuid.uuid1"
    - "time.time"
    - "time.monotonic"
    - "datetime.now"
    - "datetime.utcnow"
    - "random.random"
    - "random.choice"
    - "random.randint"
  domain_paths:
    - "src/models/"
    - "src/detectors/base.py"
  allowed_in_adapters:
    - "src/adapters/"
    - "src/utils/"
    - "src/middleware/"
  note: "Use ClockPort for time/ID, inject via constructor"

hexagonal_boundaries:
  description: "Import rules for hexagonal architecture"
  rules:
    - zone: domain_models
      path: "src/models/"
      allowed_imports:
        - "dataclasses"
        - "enum"
        - "typing"
        - "__future__"
      forbidden_imports:
        - "fastapi"
        - "pydantic"
        - "structlog"
        - "httpx"
        - "yaml"
        - "aiofiles"
    - zone: ports
      path: "src/ports/"
      allowed_imports:
        - "abc"
        - "typing"
        - "__future__"
        - "src.models"
      forbidden_imports:
        - "fastapi"
        - "pydantic"
        - "structlog"
    - zone: detectors
      path: "src/detectors/"
      note: "Detectors may import from models and ports only. Engine may import from ports. No framework imports."
    - zone: adapters
      path: "src/adapters/"
      note: "Adapters implement ports. May import stdlib, third-party libs, and ports."
    - zone: driving_adapters
      path: "src/middleware/"
      note: "May import everything. This is the composition root boundary."

testing:
  coverage_target: 80
  test_framework: pytest
  async_mode: auto
  required_test_types:
    - unit: "Individual functions/methods in isolation"
    - characterisation: "Capture existing behaviour before refactoring"
    - integration: "HTTP API tests via FastAPI TestClient"
  naming_convention: "test_{module_or_feature}.py"
  fixture_location: "tests/conftest.py"
  fake_adapters_location: "tests/helpers/fakes.py"

python_style:
  python_version: "3.10+"
  type_hints: required_on_public_apis
  docstrings: required_on_classes_and_public_methods
  imports: "from __future__ import annotations at top of every file"
  async: "Use async def for all detector scan methods and HTTP handlers"
  dataclasses: "Prefer @dataclass over plain classes for data containers"
  enums: "Use str enum (class X(str, Enum)) for serializable enums"

# ── Quality Gates ────────────────────────────────────────────────────────────

quality_gates:
  pre_refactoring:
    description: "Must pass before any refactoring task"
    checks:
      - "All characterisation tests exist and pass"
      - "All existing tests pass"
  per_task:
    description: "Must pass after every task"
    checks:
      - "pytest tests/ -v passes"
      - "No new mypy errors in modified files"
      - "No forbidden imports in domain code"
  post_refactoring:
    description: "Must pass after Epic 2 is complete"
    checks:
      - "pytest tests/ -v --cov=src --cov-report=term-missing shows >= 80%"
      - "No uuid/time/random imports in src/models/"
      - "No concrete detector imports in src/detectors/engine.py"
      - "No module-level singleton in src/middleware/app.py"
      - "All attack vector tests still pass"
